<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>CravaAí — Palpites por Pontos</title>
  <meta name="description" content="CravaAí: palpites por pontos, países, ligas, destaques e moeda fictícia." />
  <meta name="theme-color" content="#0E8A3B" />
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    :root{
      --bg:#07160c;
      --bg2:#06130b;
      --panel:#0b2214;
      --card:#0d2a18;
      --muted:#a6bbaf;
      --text:#ecfff2;

      --green:#18c964;
      --yellow:#ffd84d;
      --danger:#ff5c5c;

      --b: rgba(255,255,255,.10);
      --shadow: 0 14px 34px rgba(0,0,0,.42);

      --r: 18px;
      --r2: 22px;

      --safeB: env(safe-area-inset-bottom, 0px);
      --safeT: env(safe-area-inset-top, 0px);
      --safeL: env(safe-area-inset-left, 0px);
      --safeR: env(safe-area-inset-right, 0px);

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --maxw: 980px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(24,201,100,.20), transparent 60%),
        radial-gradient(800px 420px at 90% 0%, rgba(255,216,77,.12), transparent 55%),
        linear-gradient(180deg, #041008 0%, var(--bg2) 35%, #041008 100%);
    }

    .wrap{
      max-width:var(--maxw);
      margin:0 auto;
      padding: calc(10px + var(--safeT)) 14px calc(104px + var(--safeB)) 14px;
    }

    /* Top header (bet365 vibe) */
    .top{
      position:sticky; top:0; z-index:20;
      margin: calc(-10px - var(--safeT)) -14px 10px -14px;
      padding: calc(10px + var(--safeT)) calc(14px + var(--safeR)) 10px calc(14px + var(--safeL));
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(6,19,11,.94), rgba(6,19,11,.64));
      border-bottom: 1px solid rgba(255,255,255,.06);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .brand{display:flex; gap:10px; align-items:center}
    .logo{
      width:34px; height:34px; border-radius:12px;
      background:
        radial-gradient(16px 16px at 30% 30%, rgba(255,216,77,.95), rgba(255,216,77,.2)),
        radial-gradient(18px 18px at 70% 70%, rgba(24,201,100,.9), rgba(24,201,100,.2)),
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 20px rgba(0,0,0,.35);
    }
    .brand b{font-size:18px; letter-spacing:.2px}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}

    .topRight{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end}

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.09);
      font-size:12px; color:var(--muted);
      white-space:nowrap;
    }
    .pill strong{color:var(--text)}

    .btn{
      border:none; cursor:pointer;
      padding:10px 12px; border-radius: 999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      font-weight:900;
    }
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(24,201,100,.95), rgba(24,201,100,.68));
      border:1px solid rgba(24,201,100,.30);
      color:#03140a;
    }
    .btn.yellow{
      background: linear-gradient(135deg, rgba(255,216,77,.95), rgba(255,216,77,.72));
      border:1px solid rgba(255,216,77,.30);
      color:#1f1b03;
    }
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.12)}
    .btn.danger{background: rgba(255,92,92,.14);border:1px solid rgba(255,92,92,.22);color:#ffd8d8}

    /* Search */
    .searchBar{
      margin-top:10px;
      display:flex; gap:10px; align-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      padding: 10px 12px;
    }
    .searchIcon{opacity:.9}
    .searchBar input{
      border:none;
      outline:none;
      background: transparent;
      color: var(--text);
      width:100%;
      font-size:14px;
    }
    .searchBar input::placeholder{color: rgba(236,255,242,.45)}

    /* Category tiles (Países) */
    .tilesRow{
      margin-top:12px;
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .tile{
      min-width: 116px;
      flex: 0 0 auto;
      cursor:pointer;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      padding:10px 10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-start;
    }
    .tile:active{transform: translateY(1px)}
    .tile.on{
      background: rgba(24,201,100,.16);
      border:1px solid rgba(24,201,100,.25);
    }
    .flag{
      width:28px; height:28px;
      display:flex; align-items:center; justify-content:center;
      border-radius: 10px;
      background: rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.08);
      font-size:18px;
    }
    .tileName{font-weight:1000; font-size:13px}
    .tileMeta{font-size:12px; color: var(--muted)}

    /* Banner (fake promo area) */
    .banner{
      margin-top:12px;
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(500px 260px at 10% 10%, rgba(24,201,100,.30), transparent 60%),
        radial-gradient(420px 240px at 95% 30%, rgba(255,216,77,.22), transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }
    .banner h3{margin:0; font-size:14px; font-weight:1000}
    .banner p{margin:6px 0 0; font-size:12px; color:var(--muted); line-height:1.25}

    /* League tabs row */
    .tabsRow{
      margin-top:12px;
      display:flex;
      gap:14px;
      overflow:auto;
      padding: 6px 2px 10px;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .tab{
      cursor:pointer;
      color: var(--muted);
      font-weight:1000;
      white-space:nowrap;
      padding: 8px 2px;
      border-bottom: 3px solid transparent;
    }
    .tab.on{
      color: var(--text);
      border-bottom: 3px solid rgba(24,201,100,.85);
    }

    /* Sections */
    .section{
      margin-top:14px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .sectionHead{
      padding: 14px 14px 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sectionTitle{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:1000;
    }
    .sectionTitle .icon{
      width:30px; height:30px;
      border-radius: 12px;
      display:flex; align-items:center; justify-content:center;
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      font-size:16px;
    }
    .sectionSub{font-size:12px; color:var(--muted); margin-top:4px}
    .sectionBody{padding: 12px 14px 14px;}

    /* Featured cards (horizontal) */
    .featuredRow{
      display:flex;
      gap:12px;
      overflow:auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .featCard{
      min-width: 280px;
      flex: 0 0 auto;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      overflow:hidden;
    }
    .featTop{
      padding: 12px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    .featTag{
      font-size:11px; font-weight:1000;
      color:#1f1b03;
      background: linear-gradient(135deg, rgba(255,216,77,.95), rgba(255,216,77,.72));
      border:1px solid rgba(255,216,77,.32);
      padding:6px 8px;
      border-radius: 999px;
      white-space:nowrap;
    }
    .teams{font-weight:1000; font-size:14px; line-height:1.15}
    .meta{font-size:12px; color:var(--muted); margin-top:4px}

    /* Odds buttons */
    .oddsRow{
      padding: 10px 12px 12px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
    }
    .odd{
      cursor:pointer;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 16px;
      padding:10px 10px;
      display:flex; flex-direction:column; gap:4px;
      min-height:54px;
      justify-content:center;
    }
    .odd:active{transform: translateY(1px)}
    .odd .n{font-size:12px;color:var(--muted);font-weight:900}
    .odd .v{font-family:var(--mono);font-weight:1000}
    .odd.sel{background: rgba(24,201,100,.16); border:1px solid rgba(24,201,100,.28)}

    .moreRow{
      padding: 0 12px 12px;
    }
    .moreBtn{
      width:100%;
      padding:10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color: var(--muted);
      font-weight:1000;
      cursor:pointer;
    }

    /* Match list (vertical) */
    .match{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      border-radius: 18px;
      overflow:hidden;
      margin-top:12px;
    }
    .matchTop{
      padding:12px 12px 10px;
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    /* Bottom nav */
    .nav{
      position:fixed; left:0; right:0; bottom:0; z-index:25;
      padding: 10px calc(10px + var(--safeR)) calc(10px + var(--safeB)) calc(10px + var(--safeL));
      background: linear-gradient(180deg, rgba(6,19,11,0), rgba(6,19,11,.85) 25%, rgba(6,19,11,.96));
      border-top:1px solid rgba(255,255,255,.06);
    }
    .navIn{max-width:var(--maxw); margin:0 auto; display:flex; gap:8px}
    .navBtn{
      flex:1; border:none; cursor:pointer;
      border-radius: 18px;
      padding:12px 10px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-weight:1000;
    }
    .navBtn.on{background: rgba(24,201,100,.16); border:1px solid rgba(24,201,100,.25); color:var(--text)}

    /* Chip + Drawers */
    .chip{
      position:fixed;
      left:14px; right:14px;
      bottom: calc(74px + var(--safeB));
      max-width:var(--maxw);
      margin:0 auto;
      z-index:26;
      display:none;
    }
    .chipIn{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(24,201,100,.18), rgba(255,216,77,.10));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .chipTitle{font-weight:1000;font-size:13px}
    .chipMeta{font-size:12px;color:var(--muted);margin-top:2px}

    .overlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      z-index:40;
    }
    .drawer{
      position:fixed; left:0; right:0; bottom:0;
      transform: translateY(110%);
      transition: transform .22s ease;
      z-index:41;
      padding: 0 calc(10px + var(--safeR)) calc(10px + var(--safeB)) calc(10px + var(--safeL));
    }
    .drawer.open{transform: translateY(0)}
    .drawerCard{
      max-width:var(--maxw);
      margin:0 auto;
      border-radius: 24px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(13,42,24,.98), rgba(10,28,16,.98));
      box-shadow: 0 -18px 44px rgba(0,0,0,.5);
      overflow:hidden;
    }
    .drawerTop{
      padding:12px 14px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .grab{
      width:46px; height:5px; border-radius:999px;
      background: rgba(255,255,255,.18);
      margin: 0 auto 8px;
    }
    .drawerTitle{font-weight:1000; font-size:14px}
    .drawerSub{font-size:12px;color:var(--muted);margin-top:3px}
    .drawerBody{padding:12px 14px 14px; max-height: 68vh; overflow:auto}

    /* Markets (inside drawer) */
    .mGroup{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding:10px 10px;
      margin-bottom:10px;
    }
    .mTitle{font-weight:1000;font-size:13px}
    .mGrid{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:8px;
    }
    .mGrid.three{grid-template-columns: repeat(3, 1fr)}
    @media (max-width: 360px){ .mGrid.three{grid-template-columns: repeat(2,1fr)} }

    /* Slip items */
    .slItem{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding:10px 10px;
      display:flex; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .slL{display:flex; flex-direction:column; gap:4px}
    .sl1{font-weight:1000;font-size:13px}
    .sl2{font-size:12px;color:var(--muted);line-height:1.2}
    .slR{text-align:right; display:flex; flex-direction:column; gap:6px}
    .oddMini{font-family:var(--mono);font-weight:1000}
    .xBtn{
      border:none; cursor:pointer;
      padding:8px 10px; border-radius: 14px;
      background: rgba(255,92,92,.14);
      border:1px solid rgba(255,92,92,.22);
      color:#ffd8d8; font-weight:1000; font-size:12px;
    }

    .calc{
      border:1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding:10px 10px;
      background: rgba(0,0,0,.14);
      margin-top:10px;
    }
    .calcRow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:8px}
    .calcRow strong{font-family:var(--mono)}
    .seg{
      display:flex; background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      padding:4px;
      gap:4px;
      margin-bottom:10px;
    }
    .seg button{
      flex:1;
      border:none;
      background: transparent;
      color: var(--muted);
      padding:10px 10px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:1000;
      font-size:12px;
    }
    .seg button.on{
      background: rgba(24,201,100,.18);
      color: var(--text);
      border:1px solid rgba(24,201,100,.18);
    }

    .field{display:flex; flex-direction:column; gap:6px; margin-top:10px}
    .field label{font-size:12px; color:var(--muted); font-weight:900}
    .field input, .field select{
      width:100%;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding:12px 12px;
      color: var(--text);
      outline:none;
    }
    .hint{font-size:12px;color:var(--muted); margin-top:8px; line-height:1.25}

    .planCard{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      border-radius: 18px;
      padding:12px 12px;
      margin-bottom:10px;
    }
    .planTop{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
    .planName{font-weight:1000}
    .planPrice{font-family:var(--mono); font-weight:1000}
    .planList{margin:8px 0 0; padding-left:16px; color:var(--muted); font-size:12px; line-height:1.35}
    .badge{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:1000;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      white-space:nowrap;
    }
    .badge.green{
      color:#03140a;
      background: rgba(24,201,100,.85);
      border:1px solid rgba(24,201,100,.35);
    }
    .badge.yellow{
      color:#1f1b03;
      background: rgba(255,216,77,.88);
      border:1px solid rgba(255,216,77,.35);
    }

    .empty{
      padding:14px;
      border:1px dashed rgba(255,255,255,.18);
      border-radius: 18px;
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }
    .toast{position:fixed;left:14px;right:14px;bottom: calc(140px + var(--safeB));max-width:var(--maxw);margin:0 auto;z-index:70;display:none}
    .toast .box{padding:10px 12px;border-radius:18px;background: rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.10);backdrop-filter: blur(10px);box-shadow: var(--shadow);font-weight:1000;font-size:13px}
  </style>
</head>

<body>
  <div class="top">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <b>CravaAí</b>
        <div class="sub">Jogo de palpites com <strong>Crava Points</strong></div>
      </div>
    </div>

    <div class="topRight">
      <div class="pill">CP: <strong id="cp">0</strong></div>
      <button class="btn ghost" id="plansBtn">Planos</button>
      <button class="btn yellow" id="signupBtn">Registre-se</button>
      <button class="btn ghost" id="loginBtn">Login</button>
      <button class="btn ghost" id="installBtn" style="display:none;">Instalar</button>
    </div>
  </div>

  <div class="wrap">
    <!-- Top search + countries + leagues -->
    <div class="searchBar">
      <span class="searchIcon">🔎</span>
      <input id="searchInput" placeholder="Pesquisar time, liga, mercado..." />
    </div>

    <div class="tilesRow" id="countriesRow"></div>

    <div class="banner">
      <div>
        <h3 id="bannerTitle">Partidas de hoje</h3>
        <p id="bannerSub">Escolha um país e uma liga. Clique numa odd para abrir o bilhete.</p>
      </div>
      <button class="btn primary" id="openSlipQuick">Bilhete</button>
    </div>

    <div class="tabsRow" id="leaguesTabs"></div>

    <!-- Views -->
    <div id="view"></div>
  </div>

  <!-- Chip Bilhete -->
  <div class="chip" id="chip">
    <div class="chipIn">
      <div>
        <div class="chipTitle">Bilhete</div>
        <div class="chipMeta" id="chipMeta">0 seleções</div>
      </div>
      <button class="btn primary" id="openSlip">Abrir</button>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Drawer Mercados do jogo -->
  <div class="drawer" id="marketsDrawer">
    <div class="drawerCard">
      <div class="drawerTop">
        <div style="flex:1">
          <div class="grab"></div>
          <div class="drawerTitle" id="mTitle">Mercados</div>
          <div class="drawerSub" id="mSub">Selecione odds</div>
        </div>
        <button class="btn ghost" id="closeMarkets">Fechar</button>
      </div>
      <div class="drawerBody" id="marketsBody"></div>
    </div>
  </div>

  <!-- Drawer Bilhete -->
  <div class="drawer" id="slipDrawer">
    <div class="drawerCard">
      <div class="drawerTop">
        <div style="flex:1">
          <div class="grab"></div>
          <div class="drawerTitle">Bilhete</div>
          <div class="drawerSub" id="slipSub">0 seleções</div>
        </div>
        <button class="btn ghost" id="closeSlip">Fechar</button>
      </div>
      <div class="drawerBody" id="slipBody"></div>
    </div>
  </div>

  <!-- Drawer Planos -->
  <div class="drawer" id="plansDrawer">
    <div class="drawerCard">
      <div class="drawerTop">
        <div style="flex:1">
          <div class="grab"></div>
          <div class="drawerTitle">Planos</div>
          <div class="drawerSub">Escolha seu nível no CravaAí</div>
        </div>
        <button class="btn ghost" id="closePlans">Fechar</button>
      </div>
      <div class="drawerBody" id="plansBody"></div>
    </div>
  </div>

  <!-- Drawer Auth (Login/Cadastro) -->
  <div class="drawer" id="authDrawer">
    <div class="drawerCard">
      <div class="drawerTop">
        <div style="flex:1">
          <div class="grab"></div>
          <div class="drawerTitle" id="authTitle">Conta</div>
          <div class="drawerSub" id="authSub">Entre ou crie sua conta</div>
        </div>
        <button class="btn ghost" id="closeAuth">Fechar</button>
      </div>
      <div class="drawerBody" id="authBody"></div>
    </div>
  </div>

  <!-- Bottom nav -->

// ✅ mercado REAL 1X2 (apenas) no formato do seu app
function mkRealMatch1x2(home, away, startISO, oddsHome, oddsDraw, oddsAway, id){
  const safeId = id || uid("mt");
  const oH = Number(oddsHome), oD = Number(oddsDraw), oA = Number(oddsAway);

  const opts = [
    { id:"1", label:home, odd: Number.isFinite(oH) ? oH : null },
    { id:"X", label:"Empate", odd: Number.isFinite(oD) ? oD : null },
    { id:"2", label:away, odd: Number.isFinite(oA) ? oA : null }
  ].filter(x => x.odd && x.odd > 1);

  return {
    id: safeId,
    home, away,
    startISO,
    markets: [
      { key:"1x2", name:"Resultado (1X2)", type:"three", options: opts }
    ]
  };
}

function getRealCache(){

function cacheIsFresh(cache){
  if(!cache?.ts) return false;
  const ageMs = Date.now() - cache.ts;
  return ageMs < REAL.cacheMinutes * 60 * 1000;
}

async function fetchBrazilSerieAOdds(){
  const url = new URL(REAL.endpoint, window.location.origin);
  url.searchParams.set("sportKey", REAL.sportKey);
  url.searchParams.set("markets", REAL.markets);
  url.searchParams.set("regions", REAL.regions);
  url.searchParams.set("oddsFormat", "decimal");
  url.searchParams.set("dateFormat", "iso");
  url.searchParams.set("_ts", String(Date.now())); // evita cache

  const res = await fetch(url.toString(), { headers:{ "accept":"application/json" } });
  if(!res.ok){
    const t = await res.text().catch(()=> "");
    throw new Error(`Erro /odds HTTP ${res.status} ${t}`.slice(0,160));
  }
  return await res.json();
}

function normalizeOddsApiToMatches(items){
  const arr = Array.isArray(items) ? items
    : Array.isArray(items?.data) ? items.data
    : Array.isArray(items?.games) ? items.games
    : [];

  const out = [];
  for(const g of arr){
    const home = g.home_team || g.homeTeam || g.home;
    const away = g.away_team || g.awayTeam || g.away;
    const startISO = g.commence_time || g.commenceTime || g.start_time || g.startTime || g.date;

    if(!home || !away || !startISO) continue;

    let oddsHome=null, oddsDraw=null, oddsAway=null;

    // Odds API clássico: bookmakers -> markets(h2h) -> outcomes
    if(Array.isArray(g.bookmakers)){
      for(const bk of g.bookmakers){
        const markets = Array.isArray(bk.markets) ? bk.markets : [];
        const m = markets.find(x => (x.key || x.market) === "h2h");
        if(!m || !Array.isArray(m.outcomes)) continue;

        for(const o of m.outcomes){
          const name = String(o?.name ?? "").toLowerCase();
          const price = Number(o?.price);
          if(!Number.isFinite(price)) continue;

          if(name === String(home).toLowerCase()) oddsHome = price;
          else if(name === String(away).toLowerCase()) oddsAway = price;
          else if(name === "draw" || name === "empate" || name === "tie" || name === "x") oddsDraw = price;
        }
        break;
      }
    }

    // formato alternativo simplificado (se sua function um dia devolver assim)
    if((oddsHome==null || oddsAway==null) && g?.h2h){
      const h = g.h2h;
      if(h){
        oddsHome = Number.isFinite(Number(h.home)) ? Number(h.home) : oddsHome;
        oddsAway = Number.isFinite(Number(h.away)) ? Number(h.away) : oddsAway;
        oddsDraw = Number.isFinite(Number(h.draw)) ? Number(h.draw) : oddsDraw;
      }
    }

    const m = mkRealMatch1x2(home, away, startISO, oddsHome, oddsDraw, oddsAway, g.id);
    out.push(m);
  }

  out.sort((a,b)=> new Date(a.startISO) - new Date(b.startISO));
  return out;
}

async function ensureRealSerieA(){
  if(!REAL.enabled) return;

  const cId = getActiveCountryId();
  const lId = getActiveLeagueId();
  if(cId !== REAL.countryId || lId !== REAL.leagueId) return;

  // Se já tem dados reais “recentes” no storage da liga, não precisa bater de novo
  const cache = getRealCache();
  if(cacheIsFresh(cache)){
    const matches = cache.matches || [];
    const base = getLeagueData(REAL.countryId, REAL.leagueId);
    base.matches = matches;
    base._real = true;
    setLeagueData(REAL.countryId, REAL.leagueId, base);
    return;
  }

  // Busca real
  try{
    const json = await fetchBrazilSerieAOdds();
    const matches = normalizeOddsApiToMatches(json);

    // salva cache
    setRealCache({ ts: Date.now(), matches });

    // salva na liga BRA-A
    const base = getLeagueData(REAL.countryId, REAL.leagueId);
    base.matches = matches;
    base._real = true;
    setLeagueData(REAL.countryId, REAL.leagueId, base);
  }catch(e){
    console.error(e);
    toast("Erro ao puxar Série A real");
    // mantém o que tiver salvo anteriormente (se tiver)
    const base = getLeagueData(REAL.countryId, REAL.leagueId);
    if(!Array.isArray(base.matches) || base.matches.length===0){
      // se nunca teve nada, deixa vazio (em vez de demo)
      base.matches = [];
      base._real = true;
      setLeagueData(REAL.countryId, REAL.leagueId, base);
    }
  }
}

/* ===== Seed fictício (não mexe na Série A quando real estiver ativo) ===== */
function seedIfNeeded(){
  // seed only if no data for main league
  const cId = getActiveCountryId();
  const lId = getActiveLeagueId();

  // Se for Série A real, não cria demo
  if(REAL.enabled && cId===REAL.countryId && lId===REAL.leagueId){
    const d = getLeagueData(cId, lId);
    if(!d._real){
      d.matches = d.matches || [];
      d._real = true;
      setLeagueData(cId, lId, d);
    }
    return;
  }

  const d = getLeagueData(cId, lId);
  if (d.matches && d.matches.length) return;

  // seed some leagues across countries
  function seedLeague(countryId, leagueId, matches){
    // não seed na BRA-A real
    if(REAL.enabled && countryId===REAL.countryId && leagueId===REAL.leagueId) return;

    const base = getLeagueData(countryId, leagueId);
    if ((base.matches||[]).length) return;
    setLeagueData(countryId, leagueId, {
      matches,
      ranking: base.ranking?.length ? base.ranking : [{name:"Você", points:0},{name:"Tico",points:0},{name:"Bia",points:0}]
    });
  }

  seedLeague("BR","BRA-B",[
    mkMatch("Santos","Vasco", futureHours(4)),
    mkMatch("Sport","Ceará", futureHours(7)),
    mkMatch("Goiás","Coritiba", futureHours(10))
  ]);
  seedLeague("BR","CDB",[
    mkMatch("Atlético-MG","Bahia", futureHours(6)),
    mkMatch("Fortaleza","Fluminense", futureHours(12))
  ]);
  seedLeague("GB","EPL",[
    mkMatch("Arsenal","Chelsea", futureHours(5)),
    mkMatch("Liverpool","Man City", futureHours(9))
  ]);
  seedLeague("ES","LAL",[
    mkMatch("Barcelona","Valencia", futureHours(6)),
    mkMatch("Real Madrid","Sevilla", futureHours(11))
  ]);
  seedLeague("UEFA","UCL",[
    mkMatch("PSG","Bayern", futureHours(8)),
    mkMatch("Inter","Dortmund", futureHours(12))
  ]);
}

  return s.some(x=>x.matchId===matchId && x.marketKey===marketKey && x.optionId===optionId);

function toggleSelection(sel){
  let s=getSlip();
  // 1 seleção por mercado por jogo
  const idxSameMarket = s.findIndex(x=>x.matchId===sel.matchId && x.marketKey===sel.marketKey);
  if(idxSameMarket >= 0){
    if(s[idxSameMarket].optionId === sel.optionId){
      s.splice(idxSameMarket,1);
      setSlip(s);
      return "removed";
    }else{
      s[idxSameMarket]=sel;
      setSlip(s);
      return "replaced";
    }
  }
  s.push(sel);
  setSlip(s);
  return "added";
}

/* ===== Featured + Match list ===== */
function getAllMatchesForCountry(countryId){
  const c = getCountry(countryId);
  let all = [];
  for(const l of (c.leagues||[])){
    const d = getLeagueData(countryId, l.id);
    const matches = (d.matches||[]).map(m=>({ ...m, countryId, leagueId:l.id, leagueName:l.name, countryName:c.name, flag:c.flag }));
    all = all.concat(matches);
  }
  // sort by start time
  all.sort((a,b)=> new Date(a.startISO) - new Date(b.startISO));
  return all;
}

function getMatchesForActiveLeague(){
  const cId = getActiveCountryId();
  const lId = getActiveLeagueId();
  const c = getCountry(cId);
  const league = getLeague(cId, lId);
  const data = getLeagueData(cId, lId);
  const matches = (data.matches||[]).map(m=>({ ...m, countryId:cId, leagueId:lId, leagueName:league?.name||lId, countryName:c.name, flag:c.flag }));
  matches.sort((a,b)=> new Date(a.startISO) - new Date(b.startISO));
  return matches;
}

function oddBtn(match, market, opt){
  const sel = isSelected(match.id, market.key, opt.id) ? "sel" : "";
  const oddVal = Number(opt.odd);
  const hasOdd = Number.isFinite(oddVal) && oddVal > 1;

  return `
    <div class="odd ${sel}"
      ${hasOdd ? `data-odd="1"` : ``}
      data-country="${esc(match.countryId)}"
      data-league="${esc(match.leagueId)}"
      data-match-id="${esc(match.id)}"
      data-match="${esc(match.home+" x "+match.away)}"
      data-start="${esc(match.startISO)}"
      data-market-key="${esc(market.key)}"
      data-market="${esc(market.name)}"
      data-option-id="${esc(opt.id)}"
      data-option="${esc(opt.label)}"
      data-odd-val="${esc(String(hasOdd ? oddVal : ""))}"
      style="${hasOdd ? "" : "opacity:.45; cursor:not-allowed;"}">
      <div class="n">${esc(opt.label)}</div>
      <div class="v">${hasOdd ? oddVal.toFixed(2) : "—"}</div>
    </div>
  `;
}

function bindOddsEvents(){
  document.querySelectorAll("[data-odd='1']").forEach(el=>{
    el.addEventListener("click", ()=>{
      const oddVal = Number(el.dataset.oddVal);
      if(!Number.isFinite(oddVal) || oddVal <= 1) return;

      const sel = {
        id: uid("sl"),
        matchId: el.dataset.matchId,
        match: el.dataset.match,
        startISO: el.dataset.start,
        marketKey: el.dataset.marketKey,
        market: el.dataset.market,
        optionId: el.dataset.optionId,
        option: el.dataset.option,
        odd: oddVal
      };
      const res = toggleSelection(sel);

      // Atualiza seleção no mesmo mercado/jogo (na tela atual)
      document.querySelectorAll(`[data-odd='1'][data-match-id="${cssEsc(sel.matchId)}"][data-market-key="${cssEsc(sel.marketKey)}"]`)
        .forEach(x=>x.classList.remove("sel"));
      if(isSelected(sel.matchId, sel.marketKey, sel.optionId)) el.classList.add("sel");

      renderSlipBody();
      // requisito: clicar em odd -> abre bilhete gaveta automaticamente
      openSlipDrawer();

      toast(res==="removed" ? "Removido" : "Adicionado");
    });
  });
}

/* ===== Slip Drawer ===== */
function openSlipDrawer(){
  if(!getSlip().length) return;
  renderSlipBody();
  openDrawer(slipDrawer);
}

function renderSlipBody(){
  const body = document.getElementById("slipBody");
  const s = getSlip();
  if(!s.length){
    body.innerHTML = `<div class="empty">Sem seleções.</div>`;
    return;
  }

  const mode = loadJSON(LS.MODE, "multiple");
  const stake = Number(localStorage.getItem(LS.STAKE) || "50") || 50;
  const totalOdd = s.reduce((acc,x)=>acc * x.odd, 1);
  const retMultiple = stake * totalOdd;

  body.innerHTML = `
    <div class="seg">
      <button id="mSingle" class="${mode==="single"?"on":""}">Simples</button>
      <button id="mMulti" class="${mode==="multiple"?"on":""}">Múltipla</button>
    </div>

    ${s.map((x,i)=>`
      <div class="slItem">
        <div class="slL">
          <div class="sl1">${esc(x.option)}</div>
          <div class="sl2">${esc(x.match)} • ${esc(x.market)}</div>
          <div class="sl2">Início: ${fmtDate(x.startISO)}</div>
        </div>
        <div class="slR">
          <div class="oddMini">${x.odd.toFixed(2)}</div>
          <button class="xBtn" data-rm="${i}">Remover</button>
        </div>
      </div>
    `).join("")}

    <div class="calc">
      <div style="font-weight:1000;font-size:13px;">Stake (Crava Points)</div>
      <div class="calcRow">
        <input id="stake" type="number" min="1" step="1" value="${Math.max(1, Math.floor(stake))}" style="width:160px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10); border-radius:14px; padding:12px; color:var(--text);" />
        <button class="btn ghost" id="max">MAX</button>
      </div>

      ${mode==="multiple" ? `
        <div class="calcRow"><span style="color:var(--muted)">Odds combinadas</span><strong>${totalOdd.toFixed(2)}</strong></div>
        <div class="calcRow"><span style="color:var(--muted)">Retorno potencial</span><strong>${retMultiple.toFixed(0)} CP</strong></div>
      ` : `
        <div class="calcRow"><span style="color:var(--muted)">Custo total</span><strong>${(stake*s.length).toFixed(0)} CP</strong></div>
        <div class="hint">No modo simples, o stake vale para cada seleção.</div>
      `}

      <div class="calcRow"><span style="color:var(--muted)">Saldo</span><strong>${getPoints()} CP</strong></div>

      <div class="calcRow" style="margin-top:10px;">
        <button class="btn danger" id="clear">Limpar</button>
        <button class="btn primary" id="finish" style="flex:1;">Finalizar (simulado)</button>
      </div>
    </div>
  `;

  document.getElementById("mSingle").addEventListener("click", ()=>{ saveJSON(LS.MODE,"single"); renderSlipBody(); });
  document.getElementById("mMulti").addEventListener("click", ()=>{ saveJSON(LS.MODE,"multiple"); renderSlipBody(); });

  body.querySelectorAll("[data-rm]").forEach(b=>{
    b.addEventListener("click", ()=>{
      const idx = Number(b.dataset.rm);
      const arr = getSlip();
      arr.splice(idx,1);
      setSlip(arr);
      renderAll(); // atualiza seleções visuais
    });
  });

  document.getElementById("stake").addEventListener("input",(e)=>{
    const v = Math.max(1, Math.floor(Number(e.target.value||"1")));
    localStorage.setItem(LS.STAKE, String(v));
    renderSlipBody();
  });

  document.getElementById("max").addEventListener("click", ()=>{
    localStorage.setItem(LS.STAKE, String(Math.max(1, Math.floor(getPoints()))));
    renderSlipBody();
  });

  document.getElementById("clear").addEventListener("click", ()=>{
    if(!confirm("Limpar bilhete?")) return;
    setSlip([]);
    renderAll();
  });

  document.getElementById("finish").addEventListener("click", ()=>{
    const modeNow = loadJSON(LS.MODE,"multiple");
    const stakeNow = Math.max(1, Math.floor(Number(localStorage.getItem(LS.STAKE)||"50")));
    const slipNow = getSlip();
    if(!slipNow.length) return;

    const cost = modeNow==="multiple" ? stakeNow : stakeNow*slipNow.length;
    if(cost > getPoints()){
      toast("Saldo insuficiente");
      return;
    }
    setPoints(getPoints()-cost);
    setSlip([]);
    toast("Finalizado (simulado) ✅");
    renderAll();
  });
}

        </div>
        <div class="sectionBody">
          <div class="empty">Por enquanto, essa aba é só visual. A home já tem Países → Ligas → Partidas.</div>
        </div>
      </div>
    `;
  }
}

/* ===== Top buttons ===== */
document.getElementById("plansBtn").addEventListener("click", ()=>{
  renderPlans();
  openDrawer(plansDrawer);
});
document.getElementById("signupBtn").addEventListener("click", ()=>{
  renderAuth("signup");
  openDrawer(authDrawer);
});
document.getElementById("loginBtn").addEventListener("click", ()=>{
  renderAuth("login");
  openDrawer(authDrawer);
});

/* ===== Bottom nav events ===== */
document.querySelectorAll(".navBtn").forEach(b=>{
  b.addEventListener("click", ()=> setTab(b.dataset.tab));
});

/* ===== Search rerender ===== */
document.getElementById("searchInput").addEventListener("input", ()=>{
  if(getTab()==="inicio") renderAll();
});

/* ===== Install PWA ===== */
let deferredPrompt=null;
const installBtn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display="inline-flex";
});
installBtn.addEventListener("click", async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  installBtn.style.display="none";
});

/* ===== Service worker ===== */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}

/* ===== Init ===== */
if(!localStorage.getItem(LS.COUNTRY)) setActiveCountryId("BR");
const c = getCountry(getActiveCountryId());
if(!localStorage.getItem(LS.LEAGUE)) setActiveLeagueId(c.leagues?.[0]?.id || "BRA-A");
if(!localStorage.getItem(LS.POINTS)) setPoints(2000);

renderAll();
</script>
